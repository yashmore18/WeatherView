<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1d4ed8"/>
      <stop offset="55%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#38bdf8"/>
    </linearGradient>
  </defs>

  <!-- Full-bleed background (no rounding) - the OS applies its own mask
       shape, so content must stay inside the safe-zone circle below. -->
  <rect width="512" height="512" fill="url(#bg)"/>

  <!-- Glyph scaled/centered to sit within the maskable "safe zone"
       (inner ~80% circle), so it survives circle/squircle/rounded-square
       masking on any platform without clipping. -->
  <g transform="translate(256,256) scale(0.78) translate(-265,-204)">
    <circle cx="326" cy="188" r="66" fill="#ffffff"/>
    <g stroke="#ffffff" stroke-width="16" stroke-linecap="round">
      <line x1="326" y1="78" x2="326" y2="102"/>
      <line x1="422" y1="122" x2="405" y2="139"/>
      <line x1="247" y1="139" x2="230" y2="122"/>
    </g>
    <path d="M162 330
             a54 54 0 1 1 6 -107
             a70 70 0 0 1 132 20
             a48 48 0 0 1 -8 95
             z"
          fill="#ffffff"/>
  </g>
</svg>
