<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1d4ed8"/>
      <stop offset="55%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#38bdf8"/>
    </linearGradient>
    <linearGradient id="sheen" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.16"/>
      <stop offset="45%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#0b3a91" flood-opacity="0.28"/>
    </filter>
  </defs>

  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <rect width="512" height="512" rx="112" fill="url(#sheen)"/>

  <g filter="url(#soft)">
    <!-- sun -->
    <circle cx="326" cy="188" r="66" fill="#ffffff"/>
    <g stroke="#ffffff" stroke-width="16" stroke-linecap="round">
      <line x1="326" y1="78" x2="326" y2="102"/>
      <line x1="422" y1="122" x2="405" y2="139"/>
      <line x1="247" y1="139" x2="230" y2="122"/>
    </g>

    <!-- cloud -->
    <path d="M162 330
             a54 54 0 1 1 6 -107
             a70 70 0 0 1 132 20
             a48 48 0 0 1 -8 95
             z"
          fill="#ffffff"/>
  </g>
</svg>
