{% extends "base.html" %}

{% block title %}Locations - WeatherView{% endblock %}

{% block content %}
<div class="wv-page">
    <!-- Favorites Section -->
    <section id="favoritesSection" class="wv-section" aria-labelledby="favoritesTitle">
        <header class="wv-section__header">
            <h2 id="favoritesTitle" class="wv-section__title">Favorite Cities</h2>
            <button type="button" class="wv-btn wv-btn--ghost wv-btn--sm" id="manageFavorites" aria-label="Manage favorites">
                <i class="fas fa-cog" aria-hidden="true"></i>
                <span>Manage</span>
            </button>
        </header>
        <div class="wv-favorites-list" id="favoritesList" role="list" aria-label="Favorite cities">
            <!-- Favorites populated by JS -->
        </div>
    </section>

    <!-- Two-location head-to-head comparison -->
    <section id="comparisonSection" class="wv-section" aria-labelledby="comparisonTitle">
        <header class="wv-section__header">
            <h2 id="comparisonTitle" class="wv-section__title">Compare Two Locations</h2>
        </header>
        <form id="compareForm" class="wv-compare-form" autocomplete="off">
            <div class="wv-compare-form__field">
                <label for="compareCityA" class="sr-only">First city</label>
                <input type="text" id="compareCityA" class="glass-input" placeholder="e.g. London" autocomplete="off" required>
                <div id="compareDropdownA" class="wv-search__dropdown glass-dropdown" role="listbox" aria-label="First city suggestions"></div>
            </div>
            <span class="wv-compare-form__vs" aria-hidden="true">vs</span>
            <div class="wv-compare-form__field">
                <label for="compareCityB" class="sr-only">Second city</label>
                <input type="text" id="compareCityB" class="glass-input" placeholder="e.g. Paris" autocomplete="off" required>
                <div id="compareDropdownB" class="wv-search__dropdown glass-dropdown" role="listbox" aria-label="Second city suggestions"></div>
            </div>
            <button type="submit" class="wv-btn wv-btn--primary" id="compareSubmit">
                <i class="fas fa-balance-scale" aria-hidden="true"></i>
                <span>Compare</span>
            </button>
        </form>
        <div id="compareResult" class="wv-compare-result">
            <p class="wv-comparison-empty">Enter two cities above to see how their conditions compare.</p>
        </div>
    </section>
</div>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/compare-insights.js') }}"></script>
<script src="{{ url_for('static', filename='js/pages/locations.js') }}"></script>
{% endblock %}
