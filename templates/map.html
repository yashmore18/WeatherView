{% extends "base.html" %}

{% block title %}Map - WeatherView{% endblock %}

{% block head %}
<link rel="stylesheet" href="{{ url_for('static', filename='vendor/leaflet/leaflet.css') }}">
<script src="{{ url_for('static', filename='vendor/leaflet/leaflet.js') }}"></script>
{% endblock %}

{% block content %}
<div class="wv-page">
    <section class="wv-map-section" aria-labelledby="mapTitle">
        <header class="wv-section__header sr-only">
            <h2 id="mapTitle" class="wv-section__title">Weather Radar Map</h2>
        </header>
        <div class="wv-map-wrap">
            <div id="wvMap" class="wv-map" role="img" aria-label="Interactive weather radar map"></div>
            <div class="wv-map-controls glass-card" role="group" aria-label="Map layer selection">
                <button type="button" class="wv-btn wv-btn--secondary wv-map-layer-btn" data-layer="precipitation" aria-pressed="false">
                    <i class="fas fa-cloud-rain" aria-hidden="true"></i>
                    <span>Precipitation</span>
                </button>
                <button type="button" class="wv-btn wv-btn--secondary wv-map-layer-btn" data-layer="clouds" aria-pressed="false">
                    <i class="fas fa-cloud" aria-hidden="true"></i>
                    <span>Clouds</span>
                </button>
                <button type="button" class="wv-btn wv-btn--secondary wv-map-layer-btn" data-layer="temp" aria-pressed="false">
                    <i class="fas fa-temperature-high" aria-hidden="true"></i>
                    <span>Temperature</span>
                </button>
                <button type="button" class="wv-btn wv-btn--secondary wv-map-layer-btn" data-layer="wind" aria-pressed="false">
                    <i class="fas fa-wind" aria-hidden="true"></i>
                    <span>Wind</span>
                </button>
            </div>
            <div id="mapLegend" class="wv-map-legend glass-card" aria-live="polite"></div>
            <div id="mapLoading" class="wv-map-loading glass-card" aria-hidden="true">
                <i class="fas fa-spinner fa-spin" aria-hidden="true"></i>
            </div>
        </div>
    </section>
</div>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/pages/map.js') }}"></script>
{% endblock %}
