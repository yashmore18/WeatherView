<!DOCTYPE html>
<html lang="en" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Get current weather and 5-day forecasts for any city with geolocation support">
    <meta name="theme-color" content="#2563eb">

    <title>{% block title %}WeatherView{% endblock %}</title>

    <!-- Favicon -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌤️</text></svg>">

    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/custom.css') }}">

    <!-- PWA Manifest -->
    <link rel="manifest" href="{{ url_for('static', filename='manifest.json') }}">

    <!-- Open Graph meta tags -->
    <meta property="og:title" content="WeatherView">
    <meta property="og:description" content="Get current weather and 5-day forecasts for any city">
    <meta property="og:type" content="website">

    {% block head %}{% endblock %}
</head>
<body>
    <!-- Dynamic Weather Scene Background -->
    <div id="wvScene" class="wv-scene" data-condition="clear" data-night="false" aria-hidden="true">
        <div class="wv-scene__gradient"></div>
        <canvas id="wvSceneCanvas" class="wv-scene__canvas"></canvas>
        <div class="wv-scene__fog-band wv-scene__fog-band--1"></div>
        <div class="wv-scene__fog-band wv-scene__fog-band--2"></div>
        <div class="wv-scene__fog-band wv-scene__fog-band--3"></div>
        <div class="wv-scene__flash"></div>
    </div>

    <!-- Left Navigation Sidebar -->
    <aside class="wv-sidebar" role="navigation" aria-label="Main navigation">
        <div class="wv-sidebar__brand">
            <i class="fas fa-cloud-sun"></i>
            <span>WeatherView</span>
        </div>
        <nav class="wv-sidebar__nav">
            <a href="#heroCard" class="wv-nav-item wv-nav-item--active" data-target="heroCard" aria-current="page">
                <i class="fas fa-home"></i>
                <span>Today</span>
            </a>
            <a href="#dailySection" class="wv-nav-item" data-target="dailySection">
                <i class="fas fa-calendar-week"></i>
                <span>Forecast</span>
            </a>
            <a href="#favoritesSection" class="wv-nav-item" data-target="favoritesSection">
                <i class="fas fa-map-marker-alt"></i>
                <span>Locations</span>
            </a>
            <a href="#wvHeader" class="wv-nav-item" data-target="wvHeader">
                <i class="fas fa-cog"></i>
                <span>Settings</span>
            </a>
        </nav>
    </aside>

    <!-- Main Content Area -->
    <div class="wv-main">
        <!-- Top Bar -->
        <header id="wvHeader" class="wv-header" role="banner">
            <div class="wv-header__left">
                <h1 class="wv-header__title">Weather</h1>
            </div>
            <div class="wv-header__center">
                <!-- Search Bar -->
                <div class="wv-search" role="search">
                    <label for="citySearch" class="sr-only">Search for a city</label>
                    <i class="wv-search__icon fas fa-search" aria-hidden="true"></i>
                    <input type="text"
                           id="citySearch"
                           class="wv-search__input glass-input"
                           placeholder="Search city..."
                           aria-label="City name for weather search"
                           autocomplete="off">
                    <button type="button"
                            id="clearSearch"
                            class="wv-search__clear glass-btn"
                            aria-label="Clear search"
                            style="display: none;">
                        <i class="fas fa-times" aria-hidden="true"></i>
                    </button>
                    <!-- Autocomplete dropdown -->
                    <div id="searchDropdown" class="wv-search__dropdown glass-dropdown" role="listbox" aria-label="Search suggestions"></div>
                </div>
            </div>
            <div class="wv-header__right">
                <!-- Units Toggle -->
                <div class="wv-toggle" role="group" aria-label="Temperature units">
                    <span class="wv-toggle__label" id="unitsLabel">°C</span>
                    <label class="wv-toggle__switch" for="unitsToggle">
                        <input type="checkbox" id="unitsToggle" class="wv-toggle__input" aria-label="Toggle between Celsius and Fahrenheit">
                        <span class="wv-toggle__slider" aria-hidden="true"></span>
                    </label>
                    <span class="wv-toggle__label" id="unitsLabelAlt">°F</span>
                </div>

                <!-- Dark Mode Toggle -->
                <button type="button"
                        id="darkModeToggle"
                        class="wv-icon-btn glass-btn"
                        aria-label="Toggle dark mode"
                        aria-pressed="false">
                    <i class="fas fa-moon" aria-hidden="true"></i>
                </button>

                <!-- Location Button -->
                <button type="button"
                        id="useLocationButton"
                        class="wv-btn wv-btn--secondary glass-btn"
                        aria-label="Use current location for weather">
                    <i class="fas fa-location-arrow" aria-hidden="true"></i>
                    <span>My Location</span>
                </button>
            </div>
        </header>

        <!-- Main Content -->
        <main class="wv-content" role="main">
            {% block content %}{% endblock %}
        </main>
    </div>

    <!-- Footer -->
    <footer class="wv-footer" role="contentinfo">
        <div class="wv-footer__inner">
            <p class="wv-footer__text">
                <small>Weather data provided by OpenWeatherMap</small>
            </p>
            <p class="wv-footer__text">
                <small>Built with ❣️ in India</small>
            </p>
        </div>
    </footer>

    <!-- Hidden screen reader announcements -->
    <div aria-live="polite" aria-atomic="true" class="sr-only" id="srAnnouncements"></div>

    <!-- Custom JavaScript -->
    <script src="{{ url_for('static', filename='js/weather-scene.js') }}"></script>
    <script src="{{ url_for('static', filename='js/app.js') }}"></script>

    {% block scripts %}{% endblock %}
</body>
</html>
