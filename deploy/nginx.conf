# WeatherView - nginx reverse proxy config
#
# Sits in front of gunicorn (see gunicorn.conf.py: 3 workers x 8 threads on
# 127.0.0.1:8000). Terminates TLS, serves /static/ directly (no need to go
# through Python for files that never change per-request), gzips responses,
# and adds a second, IP+zone-based rate limit in front of Flask's own
# per-route flask-limiter as defense in depth - if gunicorn/Flask ever falls
# behind under load, nginx sheds excess connections before they even reach
# a worker.
#
# Install: copy/symlink to /etc/nginx/sites-available/weatherview.conf,
# symlink into sites-enabled, `nginx -t` to validate, then reload.
# Replace `server_name` and the TLS cert paths (certbot --nginx handles both
# automatically against a real domain).

limit_req_zone $binary_remote_addr zone=weatherview_general:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=weatherview_api:10m rate=5r/s;

upstream weatherview_app {
    server 127.0.0.1:8000 fail_timeout=5s max_fails=3;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name your-domain.example;

    # Let certbot's HTTP-01 challenge through, redirect everything else to HTTPS.
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name your-domain.example;

    ssl_certificate     /etc/letsencrypt/live/your-domain.example/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/your-domain.example/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    client_max_body_size 1m;
    keepalive_timeout 65;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Static assets: served directly by nginx, not proxied to gunicorn. Path
    # must match wherever the app is actually checked out on the host.
    location /static/ {
        alias /opt/weatherview/static/;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
        access_log off;
    }

    # API routes: tighter rate limit zone (burst allows short legitimate
    # bursts like autocomplete-while-typing or a map pan, not a hammering
    # client) - complements, not replaces, flask-limiter's per-route limits.
    location /api/ {
        limit_req zone=weatherview_api burst=20 nodelay;

        proxy_pass http://weatherview_app;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_read_timeout 30s;
    }

    location / {
        limit_req zone=weatherview_general burst=40 nodelay;

        proxy_pass http://weatherview_app;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_read_timeout 30s;
    }
}
